{{ define "main" }}

<div class="page-header">
  <h1 class="page-title">{{ .Title }}</h1>
  {{ with .Description }}<p class="page-description">{{ . }}</p>{{ end }}
</div>

{{ with .Content }}
<div class="gallery-intro">{{ . }}</div>
{{ end }}

{{ with .Params.photos }}
<div class="gallery-grid">
  {{ range $i, $p := . }}
  <a href="{{ $p.src }}" class="gallery-item" data-index="{{ $i }}" data-caption="{{ $p.caption | default "" }}">
    <img src="{{ $p.src }}" alt="{{ $p.caption | default "" }}" loading="lazy">
    {{ with $p.caption }}<p class="gallery-caption">{{ . }}</p>{{ end }}
  </a>
  {{ end }}
</div>
{{ end }}

{{/* ── Lightbox ── */}}
<div id="lb" class="lb" role="dialog" aria-modal="true">
  <button class="lb-close" aria-label="Close">&#x2715;</button>
  <button class="lb-arrow lb-prev" aria-label="Previous">&#8249;</button>
  <button class="lb-arrow lb-next" aria-label="Next">&#8250;</button>
  <div class="lb-stage">
    <img id="lb-img" src="" alt="">
    <p id="lb-caption" class="lb-caption"></p>
  </div>
  <div id="lb-dots" class="lb-dots"></div>
</div>

<style>
.lb {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(14, 12, 10, 0.96);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.25rem;
  opacity: 0;
  transition: opacity 0.22s ease;
}
.lb.lb-open { display: flex; }
.lb.lb-visible { opacity: 1; }

.lb-close {
  position: absolute;
  top: 1.1rem;
  right: 1.4rem;
  background: none;
  border: none;
  color: rgba(255,255,255,0.55);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 0.4rem;
  line-height: 1;
  transition: color 0.15s;
}
.lb-close:hover { color: #2E7D7D; }

.lb-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: rgba(255,255,255,0.45);
  font-size: 3.5rem;
  line-height: 1;
  cursor: pointer;
  padding: 0.5rem 1rem;
  transition: color 0.15s;
  user-select: none;
}
.lb-arrow:hover { color: #2E7D7D; }
.lb-prev { left: 0.5rem; }
.lb-next { right: 0.5rem; }

.lb-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
  max-width: min(90vw, 960px);
}

#lb-img {
  max-width: min(90vw, 960px);
  max-height: 78vh;
  object-fit: contain;
  border-radius: 4px;
  display: block;
  transition: opacity 0.18s ease;
}
#lb-img.lb-fade { opacity: 0; }

.lb-caption {
  color: rgba(255,255,255,0.45);
  font-size: 0.82rem;
  text-align: center;
  margin: 0;
  min-height: 1.2em;
  font-family: var(--font);
}

.lb-dots {
  display: flex;
  gap: 0.45rem;
  align-items: center;
}
.lb-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  border: none;
  cursor: pointer;
  padding: 0;
  transition: background 0.18s, transform 0.18s;
}
.lb-dot:hover { background: rgba(46, 125, 125, 0.65); }
.lb-dot.lb-dot-active {
  background: #2E7D7D;
  transform: scale(1.35);
}
</style>

<script>
(function () {
  const items = Array.from(document.querySelectorAll('.gallery-item'));
  const lb    = document.getElementById('lb');
  const img   = document.getElementById('lb-img');
  const cap   = document.getElementById('lb-caption');
  const dots  = document.getElementById('lb-dots');
  let cur = 0;

  // Build dots
  items.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'lb-dot';
    d.setAttribute('aria-label', 'Photo ' + (i + 1));
    d.addEventListener('click', () => go(i));
    dots.appendChild(d);
  });

  function updateDots() {
    dots.querySelectorAll('.lb-dot').forEach((d, i) =>
      d.classList.toggle('lb-dot-active', i === cur));
  }

  function go(n) {
    cur = (n + items.length) % items.length;
    img.classList.add('lb-fade');
    setTimeout(() => {
      const item = items[cur];
      img.src = item.getAttribute('href');
      img.alt = item.dataset.caption || '';
      cap.textContent = item.dataset.caption || '';
      img.classList.remove('lb-fade');
    }, 160);
    updateDots();
  }

  function open(n) {
    cur = n;
    const item = items[cur];
    img.src = item.getAttribute('href');
    img.alt = item.dataset.caption || '';
    cap.textContent = item.dataset.caption || '';
    lb.classList.add('lb-open');
    requestAnimationFrame(() => lb.classList.add('lb-visible'));
    updateDots();
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('lb-visible');
    setTimeout(() => { lb.classList.remove('lb-open'); img.src = ''; }, 220);
    document.body.style.overflow = '';
  }

  items.forEach((el, i) => {
    el.addEventListener('click', e => { e.preventDefault(); open(i); });
  });

  document.querySelector('.lb-close').addEventListener('click', close);
  document.querySelector('.lb-prev').addEventListener('click', () => go(cur - 1));
  document.querySelector('.lb-next').addEventListener('click', () => go(cur + 1));

  lb.addEventListener('click', e => { if (e.target === lb) close(); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('lb-open')) return;
    if (e.key === 'Escape')     close();
    if (e.key === 'ArrowLeft')  go(cur - 1);
    if (e.key === 'ArrowRight') go(cur + 1);
  });

  // Touch swipe
  let tx = 0;
  lb.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 40) go(cur + (dx < 0 ? 1 : -1));
  }, { passive: true });
})();
</script>

{{ end }}
